<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FF-WebHID Settings</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
h1 { font-size: 1.5em; border-bottom: 1px solid #333; padding-bottom: 10px; }
.setting { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a3e; }
.setting-info h3 { margin: 0 0 4px; font-size: 1em; }
.setting-info p { margin: 0; font-size: 0.85em; color: #888; }
.toggle { position: relative; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 12px; transition: 0.2s; }
.slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #ccc; border-radius: 50%; transition: 0.2s; }
input:checked + .slider { background: #4a9; }
input:checked + .slider:before { transform: translateX(20px); }
.status { margin-top: 20px; padding: 10px; background: #2a2a3e; border-radius: 6px; font-size: 0.85em; display: none; }
</style>
</head>
<body>
<h1>FF-WebHID Settings</h1>
<div class="setting">
  <div class="setting-info">
    <h3>Performance Logging</h3>
    <p>Log [webhid-timing] and [worker] timing messages to page/addon console</p>
  </div>
  <label class="toggle">
    <input type="checkbox" id="perfLogging">
    <span class="slider"></span>
  </label>
</div>
<div class="setting">
  <div class="setting-info">
    <h3>Fire-and-forget sendReport</h3>
    <p>Resolve sendReport Promise immediately without waiting for daemon ack (faster, but no error reporting on write failure)</p>
  </div>
  <label class="toggle">
    <input type="checkbox" id="fireAndForget">
    <span class="slider"></span>
  </label>
</div>
<div class="status" id="status"></div>
<script src="settings.js"></script>
</body>
</html>
