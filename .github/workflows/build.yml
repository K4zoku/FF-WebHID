name: Build

on:
  push:
    branches: [ main ]
    paths:
      - 'addon/**'
      - 'crates/**'
      - 'manifests/**'
      - 'packaging/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'addon/**'
      - 'crates/**'
      - 'manifests/**'
      - 'packaging/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: webhid-linux-x86_64
            apt_deps: libudev-dev zip
          - os: windows-latest
            artifact_name: webhid-windows-x86_64
            apt_deps: ""
          - os: macos-latest
            artifact_name: webhid-macos-universal
            apt_deps: ""

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Build Rust binaries
        run: make build

      - name: Install wasm-pack
        if: runner.os == 'Linux'
        run: cargo install wasm-pack && rustup target add wasm32-unknown-unknown

      - name: Build Addon XPI
        if: runner.os == 'Linux'
        run: make build-addon

      - name: Upload XPI
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-addon
          path: dist/webhid-addon.xpi

      - name: Prepare Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          make install-system DESTDIR=artifacts PREFIX=/usr/local

      - name: Prepare Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts/usr/local/bin artifacts/usr/local/lib/mozilla/native-messaging-hosts artifacts/etc/systemd/system
          cp crates/target/release/webhid-daemon artifacts/usr/local/bin/
          cp crates/target/release/webhid-native-messaging artifacts/usr/local/bin/
          sed 's|{{NM_BIN}}|/usr/local/bin/webhid-native-messaging|g' \
            manifests/webhid_server.json > artifacts/usr/local/lib/mozilla/native-messaging-hosts/webhid_server.json
          sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
            manifests/webhid-daemon.service > artifacts/etc/systemd/system/webhid-daemon.service

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/bin, artifacts/manifests
          Copy-Item crates/target/release/webhid-daemon.exe artifacts/bin/
          Copy-Item crates/target/release/webhid-native-messaging.exe artifacts/bin/
          Copy-Item manifests/webhid_server.windows.json artifacts/manifests/webhid_server.json

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          ./packaging/windows/build-msi.ps1 -Version $pkg.version -OutputDir artifacts

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
