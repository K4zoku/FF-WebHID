name: Build Addon

on:
  push:
    branches: [ main ]
    paths:
      - 'addon/**'
      - '.github/workflows/build-addon.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'addon/**'
      - '.github/workflows/build-addon.yml'
  workflow_dispatch:

jobs:
  build-addon:
    name: Build Addon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Define variables
        id: variables
        shell: bash
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          echo "VERSION=$(git describe --tags | sed 's/^v//;s/_/./;s/\([^-]*-g\)/r\1/;s/-/./g')" >> "$GITHUB_OUTPUT"

      - name: Node dependency audit
        run: npm audit --audit-level=high

      - name: Install dependencies
        run: npm ci

      - name: Lint addon
        run: npm run lint

      - name: Build Addon XPI
        run: make build-addon

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: webhid-addon-${{ steps.variables.outputs.VERSION }}
          path: dist/webhid-addon.xpi
          archive: false
