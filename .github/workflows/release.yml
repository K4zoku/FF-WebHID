name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Rust binaries
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Build Rust
        run: cargo build --release --manifest-path crates/Cargo.toml

      - name: Build Addon XPI
        run: ./scripts/build-addon.sh

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: webhid-addon
          path: dist/webhid-addon.xpi

      - name: Prepare Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts/bin artifacts/manifests
          cp crates/target/release/webhid-daemon artifacts/bin/
          cp crates/target/release/webhid-native-messaging artifacts/bin/
          cp manifests/webhid_server.json artifacts/manifests/ || true
          cp manifests/webhid-daemon.service artifacts/manifests/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/webhid-addon.xpi
            artifacts/bin/*
            artifacts/manifests/*

      - name: Upload to AMO
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -sS -X POST "https://addons.mozilla.org/api/v5/addons/upload/" \
            -H "Authorization: Bearer ${{ secrets.AMO_API_KEY }}" \
            -F "file=@dist/webhid-addon.xpi" \
            -F "api_key=${{ secrets.AMO_API_KEY }}"
