name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release (e.g. v1.5.1)'
        required: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: webhid-linux-x86_64
            apt_deps: libudev-dev zip
          - os: windows-latest
            artifact_name: webhid-windows-x86_64
            apt_deps: ""
          - os: macos-latest
            artifact_name: webhid-macos-universal
            apt_deps: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_deps }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Build Rust binaries
        run: make build

      - name: Install wasm-pack
        if: runner.os == 'Linux'
        run: cargo install wasm-pack && rustup target add wasm32-unknown-unknown

      - name: Build Addon XPI
        if: runner.os == 'Linux'
        run: make build-addon

      - name: Upload XPI artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-addon
          path: dist/webhid-addon.xpi

      - name: Prepare Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          make install-system DESTDIR=artifacts PREFIX=/usr/local

      - name: Prepare Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts/usr/local/bin artifacts/usr/local/lib/mozilla/native-messaging-hosts artifacts/etc/systemd/system
          cp crates/target/release/webhid-daemon artifacts/usr/local/bin/
          cp crates/target/release/webhid-native-messaging artifacts/usr/local/bin/
          sed 's|{{NM_BIN}}|/usr/local/bin/webhid-native-messaging|g' \
            manifests/webhid_server.json > artifacts/usr/local/lib/mozilla/native-messaging-hosts/webhid_server.json
          sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
            manifests/webhid-daemon.service > artifacts/etc/systemd/system/webhid-daemon.service

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/bin, artifacts/manifests
          Copy-Item crates/target/release/webhid-daemon.exe artifacts/bin/
          Copy-Item crates/target/release/webhid-native-messaging.exe artifacts/bin/
          Copy-Item manifests/webhid_server.windows.json artifacts/manifests/webhid_server.json

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install WiX v5 as a dotnet global tool
          dotnet tool install --global wix
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          ./packaging/windows/build-msi.ps1 -Version $pkg.version -OutputDir artifacts

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download XPI
        uses: actions/download-artifact@v8
        with:
          name: webhid-addon
          path: dist/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-x86_64
          path: artifacts-linux/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-x86_64
          path: artifacts-windows/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: webhid-macos-universal
          path: artifacts-macos/

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Package artifacts per platform
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER=${{ steps.tag.outputs.name }}
          cp dist/webhid-addon.xpi "dist/webhid-addon-${VER}.xpi"
          cd artifacts-linux   && zip -r "../webhid-linux-x86_64-${VER}.zip"   . && cd ..
          cd artifacts-windows && zip -r "../webhid-windows-x86_64-${VER}.zip" . && cd ..
          cd artifacts-macos   && zip -r "../webhid-macos-universal-${VER}.zip" . && cd ..
          # MSI is uploaded as-is (already a single-file installer)
          cp artifacts-windows/webhid-*.msi . 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/webhid-addon-*.xpi
            webhid-*.zip
            webhid-*.msi

      # - name: Upload to AMO
      #   uses: kewisch/action-web-ext@v2
      #   with:
      #     cmd: sign
      #     source: dist/webhid-addon-${{ steps.tag.outputs.name }}.xpi
      #     channel: listed
      #     apiKey: ${{ secrets.AMO_JWT_ISSUER }}
      #     apiSecret: ${{ secrets.AMO_JWT_SECRET }}
      #     timeout: 900000
