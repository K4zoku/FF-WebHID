name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release (e.g. v1.5.1)'
        required: true

jobs:
  build-addon:
    name: Build Addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Define variables
        id: variables
        shell: bash
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          echo "VERSION=$(git describe --tags | sed 's/^v//;s/_/./;s/\([^-]*-g\)/r\1/;s/-/./g')" >> "$GITHUB_OUTPUT"

      - name: Build Addon XPI
        run: make build-addon

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: webhid-addon-${{ steps.variables.outputs.VERSION }}
          path: dist/webhid-addon.xpi
          archive: false

  build:
    name: Build (${{ matrix.os }} ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            artifact_name: webhid-linux-x86_64
            apt_deps: libudev-dev zip
            rust_target: ""
          - os: ubuntu-24.04-arm
            arch: aarch64
            artifact_name: webhid-linux-aarch64
            apt_deps: libudev-dev zip
            rust_target: ""
          - os: windows-2022
            arch: universal
            artifact_name: webhid-windows
            apt_deps: ""
            rust_target: ""
          - os: macos-15
            arch: universal
            artifact_name: webhid-macos
            apt_deps: ""
            rust_target: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Define variables
        id: variables
        shell: bash
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          echo "VERSION=$(git describe --tags | sed 's/^v//;s/_/./;s/\([^-]*-g\)/r\1/;s/-/./g')" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_deps }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Build Rust binaries
        if: runner.os == 'Linux'
        run: cargo build --release --manifest-path crates/Cargo.toml
        shell: bash

      - name: Prepare Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          BIN_DIR="crates/target/release"
          mkdir -p artifacts/usr/local/bin artifacts/usr/local/lib/mozilla/native-messaging-hosts artifacts/etc/systemd/system
          cp "$BIN_DIR/webhid-daemon" artifacts/usr/local/bin/
          cp "$BIN_DIR/webhid-native-messaging" artifacts/usr/local/bin/
          sed 's|{{NM_BIN}}|/usr/local/bin/webhid-native-messaging|g' \
            manifests/webhid.forwarder_nm_host.json > artifacts/usr/local/lib/mozilla/native-messaging-hosts/webhid.forwarder_nm_host.json
          sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
            manifests/webhid.daemon_nm_host.json > artifacts/usr/local/lib/mozilla/native-messaging-hosts/webhid.daemon_nm_host.json
          sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
            manifests/webhid-daemon.service > artifacts/etc/systemd/system/webhid-daemon.service

      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        run: |
          VER=$(grep -oP '"version":\s*"\K[^"]+' package.json)
          DEB_ARCH=$(if [ "${{ matrix.arch }}" = "aarch64" ]; then echo "arm64"; else echo "amd64"; fi)
          ./packaging/linux/debian/build-deb.sh "$VER" "$DEB_ARCH"
        shell: bash

      - name: Build .rpm (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y rpm
          VER=$(grep -oP '"version":\s*"\K[^"]+' package.json)
          ./packaging/linux/rpm/build-rpm.sh "$VER" "${{ matrix.arch }}"
        shell: bash

      - name: Prepare Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          # Build all 3 variants on one macOS runner via cross-compile + lipo
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --manifest-path crates/Cargo.toml \
          --target x86_64-apple-darwin --target aarch64-apple-darwin

          # Create universal binaries with lipo
          mkdir -p crates/target/universal-apple-darwin/release
          lipo -create \
            crates/target/x86_64-apple-darwin/release/webhid-daemon \
            crates/target/aarch64-apple-darwin/release/webhid-daemon \
            -output crates/target/universal-apple-darwin/release/webhid-daemon
          lipo -create \
            crates/target/x86_64-apple-darwin/release/webhid-native-messaging \
            crates/target/aarch64-apple-darwin/release/webhid-native-messaging \
            -output crates/target/universal-apple-darwin/release/webhid-native-messaging

          stage_macos() {
            local src_dir="$1" out_dir="$2"
            mkdir -p "$out_dir/usr/local/bin" "$out_dir/usr/local/lib/mozilla/native-messaging-hosts" "$out_dir/etc/systemd/system"
            cp "$src_dir/webhid-daemon" "$out_dir/usr/local/bin/"
            cp "$src_dir/webhid-native-messaging" "$out_dir/usr/local/bin/"
            sed 's|{{NM_BIN}}|/usr/local/bin/webhid-native-messaging|g' \
              manifests/webhid.forwarder_nm_host.json > "$out_dir/usr/local/lib/mozilla/native-messaging-hosts/webhid.forwarder_nm_host.json"
            sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
              manifests/webhid.daemon_nm_host.json > "$out_dir/usr/local/lib/mozilla/native-messaging-hosts/webhid.daemon_nm_host.json"
            sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
              manifests/webhid-daemon.service > "$out_dir/etc/systemd/system/webhid-daemon.service"
          }

          stage_macos "crates/target/x86_64-apple-darwin/release" "artifacts-x86_64"
          stage_macos "crates/target/aarch64-apple-darwin/release" "artifacts-aarch64"
          stage_macos "crates/target/universal-apple-darwin/release" "artifacts-universal"

      - name: Build Windows binaries (both archs)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup target add x86_64-pc-windows-msvc aarch64-pc-windows-msvc
          cargo build --release --manifest-path crates/Cargo.toml --target x86_64-pc-windows-msvc --target aarch64-pc-windows-msvc

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Stage-Windows($binDir, $outDir) {
            New-Item -ItemType Directory -Force -Path "$outDir/bin", "$outDir/manifests" | Out-Null
            Copy-Item "$binDir/webhid-daemon.exe" "$outDir/bin/"
            Copy-Item "$binDir/webhid-native-messaging.exe" "$outDir/bin/"
            Copy-Item manifests/webhid.forwarder_nm_host.json "$outDir/manifests/webhid.forwarder_nm_host.json"
            Copy-Item manifests/webhid.daemon_nm_host.json "$outDir/manifests/webhid.daemon_nm_host.json"
          }
          Stage-Windows "crates/target/x86_64-pc-windows-msvc/release" "artifacts-portable-x86_64"
          Stage-Windows "crates/target/aarch64-pc-windows-msvc/release" "artifacts-portable-aarch64"

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          wix extension add -g WixToolset.UI.wixext/6.0.2
          ./packaging/windows/build-msi.ps1 -Version $pkg.version -Arch x86_64 -OutputDir artifacts-msi-x86_64
          ./packaging/windows/build-msi.ps1 -Version $pkg.version -Arch aarch64 -OutputDir artifacts-msi-aarch64

      - name: Upload Windows x86_64 portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-windows-x86_64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-portable-x86_64/

      - name: Upload Windows x86_64 MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-windows-x86_64-msi-${{ steps.variables.outputs.VERSION }}
          path: artifacts-msi-x86_64/*.msi
          archive: false

      - name: Upload Windows aarch64 portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-windows-aarch64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-portable-aarch64/

      - name: Upload Windows aarch64 MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-windows-aarch64-msi-${{ steps.variables.outputs.VERSION }}
          path: artifacts-msi-aarch64/*.msi
          archive: false

      - name: Upload Artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.variables.outputs.VERSION }}
          path: artifacts/

      - name: Upload .deb (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-deb-${{ steps.variables.outputs.VERSION }}
          path: dist/*.deb
          archive: false

      - name: Upload .rpm (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-rpm-${{ steps.variables.outputs.VERSION }}
          path: dist/*.rpm
          archive: false

      - name: Upload macOS x86_64
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-macos-x86_64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-x86_64/

      - name: Upload macOS aarch64
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-macos-aarch64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-aarch64/

      - name: Upload macOS universal
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-macos-universal-${{ steps.variables.outputs.VERSION }}
          path: artifacts-universal/

  release:
    name: Create GitHub Release
    needs: [build-addon, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Define variables
        id: variables
        shell: bash
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          echo "VERSION=$(git describe --tags | sed 's/^v//;s/_/./;s/\([^-]*-g\)/r\1/;s/-/./g')" >> "$GITHUB_OUTPUT"

      - name: Download XPI
        uses: actions/download-artifact@v8
        with:
          name: webhid-addon-${{ steps.variables.outputs.VERSION }}
          path: dist/

      - name: Download Linux x86_64
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-x86_64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-linux-x86_64/

      - name: Download Linux aarch64
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-aarch64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-linux-aarch64/

      - name: Download Windows x86_64 portable
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-x86_64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-windows-x86_64/

      - name: Download Windows x86_64 MSI
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-x86_64-msi-${{ steps.variables.outputs.VERSION }}
          path: artifacts-windows-x86_64-msi/

      - name: Download Windows aarch64 portable
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-aarch64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-windows-aarch64/

      - name: Download Windows aarch64 MSI
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-aarch64-msi-${{ steps.variables.outputs.VERSION }}
          path: artifacts-windows-aarch64-msi/

      - name: Download macOS x86_64
        uses: actions/download-artifact@v8
        with:
          name: webhid-macos-x86_64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-macos-x86_64/

      - name: Download macOS aarch64
        uses: actions/download-artifact@v8
        with:
          name: webhid-macos-aarch64-${{ steps.variables.outputs.VERSION }}
          path: artifacts-macos-aarch64/

      - name: Download macOS universal
        uses: actions/download-artifact@v8
        with:
          name: webhid-macos-universal-${{ steps.variables.outputs.VERSION }}
          path: artifacts-macos-universal/

      - name: Download Linux x86_64 .deb
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-x86_64-deb-${{ steps.variables.outputs.VERSION }}
          path: debs-x86_64/

      - name: Download Linux aarch64 .deb
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-aarch64-deb-${{ steps.variables.outputs.VERSION }}
          path: debs-aarch64/

      - name: Download Linux x86_64 .rpm
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-x86_64-rpm-${{ steps.variables.outputs.VERSION }}
          path: rpms-x86_64/

      - name: Download Linux aarch64 .rpm
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-aarch64-rpm-${{ steps.variables.outputs.VERSION }}
          path: rpms-aarch64/

      - name: Package artifacts per platform
        run: |
          VER=${{ steps.variables.outputs.VERSION }}
          cd artifacts-linux-x86_64   && zip -r "../webhid-linux-x86_64-${VER}.zip"   . && cd ..
          cd artifacts-linux-aarch64  && zip -r "../webhid-linux-aarch64-${VER}.zip"  . && cd ..
          cd artifacts-windows-x86_64 && zip -r "../webhid-windows-x86_64-${VER}.zip" . && cd ..
          cd artifacts-windows-aarch64 && zip -r "../webhid-windows-aarch64-${VER}.zip" . && cd ..
          cd artifacts-macos-x86_64    && zip -r "../webhid-macos-x86_64-${VER}.zip"    . && cd ..
          cd artifacts-macos-aarch64   && zip -r "../webhid-macos-aarch64-${VER}.zip"   . && cd ..
          cd artifacts-macos-universal && zip -r "../webhid-macos-universal-${VER}.zip" . && cd ..

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.xpi
            webhid-*.zip
            artifacts-windows-x86_64-msi/*.msi
            artifacts-windows-aarch64-msi/*.msi
            debs-x86_64/*.deb
            debs-aarch64/*.deb
            rpms-x86_64/*.rpm
            rpms-aarch64/*.rpm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.xpi
            webhid-*.zip
            artifacts-windows-x86_64-msi/*.msi
            artifacts-windows-aarch64-msi/*.msi
            debs-x86_64/*.deb
            debs-aarch64/*.deb
            rpms-x86_64/*.rpm
            rpms-aarch64/*.rpm

      # - name: Upload to AMO
      #   uses: kewisch/action-web-ext@v2
      #   with:
      #     cmd: sign
      #       source: dist/webhid-addon-${{ steps.variables.outputs.VERSION }}.xpi
      #     channel: listed
      #     apiKey: ${{ secrets.AMO_JWT_ISSUER }}
      #     apiSecret: ${{ secrets.AMO_JWT_SECRET }}
      #     timeout: 900000
