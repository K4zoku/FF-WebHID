name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release (e.g. v1.5.1)'
        required: true

jobs:
  build-addon:
    name: Build Addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Install wasm-pack
        run: cargo install wasm-pack && rustup target add wasm32-unknown-unknown

      - name: Build Addon XPI
        run: make build-addon

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: webhid-addon
          path: dist/webhid-addon.xpi

  build:
    name: Build (${{ matrix.os }} ${{ matrix.arch }})
    needs: build-addon
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            artifact_name: webhid-linux-x86_64
            apt_deps: libudev-dev zip
            rust_target: ""
          - os: ubuntu-latest
            arch: aarch64
            artifact_name: webhid-linux-aarch64
            apt_deps: libudev-dev zip gcc-aarch64-linux-gnu
            rust_target: aarch64-unknown-linux-gnu
          - os: windows-latest
            arch: x86_64
            artifact_name: webhid-windows-x86_64
            apt_deps: ""
            rust_target: ""
          - os: windows-latest
            arch: aarch64
            artifact_name: webhid-windows-aarch64
            apt_deps: ""
            rust_target: aarch64-pc-windows-msvc
          - os: macos-latest
            arch: universal
            artifact_name: webhid-macos
            apt_deps: ""
            rust_target: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_deps }}
          if [ -n "${{ matrix.rust_target }}" ] && [ "${{ matrix.rust_target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
              sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
            fi
            CODENAME="$(lsb_release -cs)"
            sudo tee /etc/apt/sources.list.d/arm64-ports.list >/dev/null <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-security main restricted universe multiverse
          EOF
            sudo apt-get update
            sudo apt-get install -y libudev-dev:arm64
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Build Rust binaries
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            if [ "${{ matrix.rust_target }}" = "aarch64-unknown-linux-gnu" ]; then
              export PKG_CONFIG_ALLOW_CROSS=1
              export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
            fi
            cargo build --release --target ${{ matrix.rust_target }} --manifest-path crates/Cargo.toml
          else
            make build
          fi
        shell: bash

      - name: Prepare Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            BIN_DIR="crates/target/${{ matrix.rust_target }}/release"
          else
            BIN_DIR="crates/target/release"
          fi
          mkdir -p artifacts/usr/local/bin artifacts/usr/local/lib/mozilla/native-messaging-hosts artifacts/etc/systemd/system
          cp "$BIN_DIR/webhid-daemon" artifacts/usr/local/bin/
          cp "$BIN_DIR/webhid-native-messaging" artifacts/usr/local/bin/
          sed 's|{{NM_BIN}}|/usr/local/bin/webhid-native-messaging|g' \
            manifests/webhid-native-messaging-host.json > artifacts/usr/local/lib/mozilla/native-messaging-hosts/webhid-native-messaging-host.json
          sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
            manifests/webhid-daemon.service > artifacts/etc/systemd/system/webhid-daemon.service

      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        run: |
          VER=$(grep -oP '"version":\s*"\K[^"]+' package.json)
          DEB_ARCH=$(if [ "${{ matrix.arch }}" = "aarch64" ]; then echo "arm64"; else echo "amd64"; fi)
          ./packaging/linux/debian/build-deb.sh "$VER" "$DEB_ARCH" "${{ matrix.rust_target }}"
        shell: bash

      - name: Build .rpm (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y rpm
          VER=$(grep -oP '"version":\s*"\K[^"]+' package.json)
          ./packaging/linux/rpm/build-rpm.sh "$VER" "${{ matrix.arch }}" "${{ matrix.rust_target }}"
        shell: bash

      - name: Prepare Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          # Build all 3 variants on one macOS runner via cross-compile + lipo
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin --manifest-path crates/Cargo.toml
          cargo build --release --target aarch64-apple-darwin --manifest-path crates/Cargo.toml
          lipo -create \
            crates/target/x86_64-apple-darwin/release/webhid-daemon \
            crates/target/aarch64-apple-darwin/release/webhid-daemon \
            -output /tmp/webhid-daemon-universal
          lipo -create \
            crates/target/x86_64-apple-darwin/release/webhid-native-messaging \
            crates/target/aarch64-apple-darwin/release/webhid-native-messaging \
            -output /tmp/webhid-native-messaging-universal

          stage_macos() {
            local src_dir="$1" out_dir="$2"
            mkdir -p "$out_dir/usr/local/bin" "$out_dir/usr/local/lib/mozilla/native-messaging-hosts" "$out_dir/etc/systemd/system"
            cp "$src_dir/webhid-daemon" "$out_dir/usr/local/bin/"
            cp "$src_dir/webhid-native-messaging" "$out_dir/usr/local/bin/"
            sed 's|{{NM_BIN}}|/usr/local/bin/webhid-native-messaging|g' \
              manifests/webhid-native-messaging-host.json > "$out_dir/usr/local/lib/mozilla/native-messaging-hosts/webhid-native-messaging-host.json"
            sed 's|{{DAEMON_BIN}}|/usr/local/bin/webhid-daemon|g' \
              manifests/webhid-daemon.service > "$out_dir/etc/systemd/system/webhid-daemon.service"
          }

          stage_macos "crates/target/x86_64-apple-darwin/release"   "artifacts-x86_64"
          stage_macos "crates/target/aarch64-apple-darwin/release"  "artifacts-aarch64"
          stage_macos "/tmp"                                        "artifacts-universal"
          mv /tmp/webhid-daemon-universal artifacts-universal/usr/local/bin/webhid-daemon
          mv /tmp/webhid-native-messaging-universal artifacts-universal/usr/local/bin/webhid-native-messaging

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts-portable/bin, artifacts-portable/manifests
          if ("${{ matrix.rust_target }}") {
            $binDir = "crates/target/${{ matrix.rust_target }}/release"
          } else {
            $binDir = "crates/target/release"
          }
          Copy-Item "$binDir/webhid-daemon.exe" artifacts-portable/bin/
          Copy-Item "$binDir/webhid-native-messaging.exe" artifacts-portable/bin/
          Copy-Item manifests/webhid-native-messaging-host.json artifacts-portable/manifests/webhid-native-messaging-host.json

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          ./packaging/windows/build-msi.ps1 -Version $pkg.version -Arch ${{ matrix.arch }} -OutputDir artifacts-msi

      - name: Upload Portable Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts-portable/

      - name: Upload MSI Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-msi
          path: artifacts-msi/

      - name: Upload Artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/

      - name: Upload .deb (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-deb
          path: dist/*.deb

      - name: Upload .rpm (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-rpm
          path: dist/*.rpm

      - name: Upload macOS x86_64
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-macos-x86_64
          path: artifacts-x86_64/

      - name: Upload macOS aarch64
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-macos-aarch64
          path: artifacts-aarch64/

      - name: Upload macOS universal
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: webhid-macos-universal
          path: artifacts-universal/

  release:
    name: Create GitHub Release
    needs: [build-addon, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download XPI
        uses: actions/download-artifact@v8
        with:
          name: webhid-addon
          path: dist/

      - name: Download Linux x86_64
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-x86_64
          path: artifacts-linux-x86_64/

      - name: Download Linux aarch64
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-aarch64
          path: artifacts-linux-aarch64/

      - name: Download Windows x86_64 portable
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-x86_64
          path: artifacts-windows-x86_64/

      - name: Download Windows x86_64 MSI
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-x86_64-msi
          path: artifacts-windows-x86_64-msi/

      - name: Download Windows aarch64 portable
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-aarch64
          path: artifacts-windows-aarch64/

      - name: Download Windows aarch64 MSI
        uses: actions/download-artifact@v8
        with:
          name: webhid-windows-aarch64-msi
          path: artifacts-windows-aarch64-msi/

      - name: Download macOS x86_64
        uses: actions/download-artifact@v8
        with:
          name: webhid-macos-x86_64
          path: artifacts-macos-x86_64/

      - name: Download macOS aarch64
        uses: actions/download-artifact@v8
        with:
          name: webhid-macos-aarch64
          path: artifacts-macos-aarch64/

      - name: Download macOS universal
        uses: actions/download-artifact@v8
        with:
          name: webhid-macos-universal
          path: artifacts-macos-universal/

      - name: Download Linux x86_64 .deb
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-x86_64-deb
          path: debs-x86_64/

      - name: Download Linux aarch64 .deb
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-aarch64-deb
          path: debs-aarch64/

      - name: Download Linux x86_64 .rpm
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-x86_64-rpm
          path: rpms-x86_64/

      - name: Download Linux aarch64 .rpm
        uses: actions/download-artifact@v8
        with:
          name: webhid-linux-aarch64-rpm
          path: rpms-aarch64/

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Package artifacts per platform
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER=${{ steps.tag.outputs.name }}
          cp dist/webhid-addon.xpi "dist/webhid-addon-${VER}.xpi"
          # Zip portable artifacts
          cd artifacts-linux-x86_64   && zip -r "../webhid-linux-x86_64-${VER}.zip"   . && cd ..
          cd artifacts-linux-aarch64  && zip -r "../webhid-linux-aarch64-${VER}.zip"  . && cd ..
          cd artifacts-windows-x86_64 && zip -r "../webhid-windows-x86_64-${VER}.zip" . && cd ..
          cd artifacts-windows-aarch64 && zip -r "../webhid-windows-aarch64-${VER}.zip" . && cd ..
          cd artifacts-macos-x86_64    && zip -r "../webhid-macos-x86_64-${VER}.zip"    . && cd ..
          cd artifacts-macos-aarch64   && zip -r "../webhid-macos-aarch64-${VER}.zip"   . && cd ..
          cd artifacts-macos-universal && zip -r "../webhid-macos-universal-${VER}.zip" . && cd ..
          # MSI files
          cp artifacts-windows-x86_64-msi/*.msi . 2>/dev/null || true
          cp artifacts-windows-aarch64-msi/*.msi . 2>/dev/null || true
          # .deb and .rpm files
          cp debs-x86_64/*.deb . 2>/dev/null || true
          cp debs-aarch64/*.deb . 2>/dev/null || true
          cp rpms-x86_64/*.rpm . 2>/dev/null || true
          cp rpms-aarch64/*.rpm . 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/webhid-addon-*.xpi
            webhid-*.zip
            webhid-*.msi
            webhid-*.deb
            webhid-*.rpm

      # - name: Upload to AMO
      #   uses: kewisch/action-web-ext@v2
      #   with:
      #     cmd: sign
      #     source: dist/webhid-addon-${{ steps.tag.outputs.name }}.xpi
      #     channel: listed
      #     apiKey: ${{ secrets.AMO_JWT_ISSUER }}
      #     apiSecret: ${{ secrets.AMO_JWT_SECRET }}
      #     timeout: 900000
